<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="supported-color-schemes" content="light only" />
    <title>Email Signature</title>
    <style>
      :root {
        color-scheme: light only;
        supported-color-schemes: light only;
      }

      body,
      table,
      td,
      p,
      a {
        color-scheme: light only;
      }

      [data-ogsc] .signature-wrapper,
      [data-ogsb] .signature-wrapper {
        background-color: #ffffff !important;
      }

      [data-ogsc] .signature-name,
      [data-ogsb] .signature-name {
        color: #000000 !important;
        -webkit-text-fill-color: #000000 !important;
      }

      [data-ogsc] .signature-blue,
      [data-ogsb] .signature-blue {
        color: #005de9 !important;
        -webkit-text-fill-color: #005de9 !important;
      }
    </style>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #ffffff !important;
      color: #000000 !important;
      color-scheme: light only;
    "
  >
    <table
      class="signature-wrapper"
      cellpadding="0"
      cellspacing="0"
      width="600"
      height="280"
      style="
        width: 600px !important;
        height: 280px !important;
        background-image: url(&quot;https://montra-email-signature.vercel.app/img/email-signature-bg.png&quot;);
        background-repeat: no-repeat;
        background-size: 600px 280px;
        background-position: center;
        background-color: #ffffff !important;
        color: #000000 !important;
        color-scheme: light only;
        font-family: Arial, Helvetica, sans-serif;
      "
      bgcolor="#ffffff"
    >
      <tr>
        <!-- LEFT CONTENT -->
        <td
          valign="top"
          width="330"
          style="padding-left: 38px; padding-top: 25px"
        >
          <!-- Name + Designation -->
          <table cellpadding="0" cellspacing="0" width="100%">
            <tr>
              <td>
                <p
                  class="signature-name"
                  style="
                    margin: 0;
                    font-size: 36px;
                    line-height: 42px;
                    font-weight: 500;
                    color: #000000 !important;
                    -webkit-text-fill-color: #000000 !important;
                    letter-spacing: -1px;
                  "
                >
                  Manisha Doriya
                </p>

                <p
                  class="signature-blue"
                  style="
                    margin: 4px 0 0 0;
                    font-size: 15px;
                    line-height: 19px;
                    font-weight: 400;
                    color: #005de9 !important;
                    -webkit-text-fill-color: #005de9 !important;
                  "
                >
                  Senior HR Executive
                </p>
              </td>
            </tr>
          </table>

          <!-- Spacer -->
          <table cellpadding="0" cellspacing="0" width="100%">
            <tr>
              <td height="55"></td>
            </tr>
          </table>

          <!-- Contact Details -->
          <table cellpadding="0" cellspacing="0" width="310">
            <tr>
              <td width="38" height="34" valign="middle">
                <img
                  src="https://montra-email-signature.vercel.app/img/contact.png"
                  alt="Phone"
                  width="19"
                  style="
                    display: block;
                    opacity: 1 !important;
                    filter: none !important;
                    -webkit-filter: none !important;
                    mix-blend-mode: normal !important;
                  "
                />
              </td>
              <td height="34" valign="middle">
                <a
                  class="signature-blue"
                  href="tel:+918447315286"
                  style="
                    font-size: 15px;
                    line-height: 20px;
                    color: #005de9 !important;
                    -webkit-text-fill-color: #005de9 !important;
                    text-decoration: none;
                    font-weight: 400;
                  "
                >
                  +91 8447315286
                </a>
              </td>
            </tr>

            <tr>
              <td width="38" height="34" valign="middle">
                <img
                  src="https://montra-email-signature.vercel.app/img/web.png"
                  alt="Website"
                  width="19"
                  style="
                    display: block;
                    opacity: 1 !important;
                    filter: none !important;
                    -webkit-filter: none !important;
                    mix-blend-mode: normal !important;
                  "
                />
              </td>
              <td height="34" valign="middle">
                <a
                  class="signature-blue"
                  href="https://www.montra.app/"
                  target="_blank"
                  style="
                    font-size: 15px;
                    line-height: 20px;
                    color: #005de9 !important;
                    -webkit-text-fill-color: #005de9 !important;
                    text-decoration: none;
                    font-weight: 400;
                  "
                >
                  www.montra.app
                </a>
              </td>
            </tr>

            <tr>
              <td width="38" height="34" valign="middle">
                <img
                  src="https://montra-email-signature.vercel.app/img/location.png"
                  alt="Location"
                  width="19"
                  style="
                    display: block;
                    opacity: 1 !important;
                    filter: none !important;
                    -webkit-filter: none !important;
                    mix-blend-mode: normal !important;
                  "
                />
              </td>
              <td height="34" valign="middle">
                <p
                  class="signature-blue"
                  style="
                    margin: 0;
                    width: 200px;
                    font-size: 15px;
                    line-height: 20px;
                    color: #005de9 !important;
                    -webkit-text-fill-color: #005de9 !important;
                    font-weight: 400;
                  "
                >
                  #312, I-Thum, A-40, Sector - 62, Noida, U.P. (201309)
                </p>
              </td>
            </tr>
          </table>
        </td>

        <!-- RIGHT SIDE -->
        <td
          valign="top"
          width="270"
          style="padding-top: 28px; padding-right: 35px"
        >
          <!-- Logo -->
          <table cellpadding="0" cellspacing="0" width="100%">
            <tr>
              <td align="right">
                <a href="#" target="_blank">
                  <img
                    src="https://montra-email-signature.vercel.app/img/logo.png"
                    alt="Montra"
                    width="135"
                    style="
                      display: block;
                      opacity: 1 !important;
                      filter: none !important;
                      -webkit-filter: none !important;
                      mix-blend-mode: normal !important;
                    "
                  />
                </a>
              </td>
            </tr>
          </table>

          <!-- Social Icons -->
          <table cellpadding="0" cellspacing="0" width="100%">
            <tr>
              <td height="175"></td>
            </tr>

            <tr>
              <td align="right">
                <table cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="padding-left: 20px">
                      <a
                        href="https://www.facebook.com/people/Montra-Nigeria/61553206088663/"
                        target="_blank"
                      >
                        <img
                          src="https://m4cs.vercel.app/img/new-fb.png"
                          alt="Facebook"
                          width="10"
                          style="
                            display: block;
                            opacity: 1 !important;
                            filter: none !important;
                            -webkit-filter: none !important;
                            mix-blend-mode: normal !important;
                            
                          "
                        />
                      </a>
                    </td>

                    <td style="padding-left: 20px">
                      <a
                        href="https://www.linkedin.com/company/montra-inc/?_l=en_US"
                        target="_blank"
                      >
                        <img
                          src="https://m4cs.vercel.app/img/new-linkedin.png"
                          alt="LinkedIn"
                          width="18"
                          style="
                            display: block;
                            opacity: 1 !important;
                            filter: none !important;
                            -webkit-filter: none !important;
                            mix-blend-mode: normal !important;
                            
                          "
                        />
                      </a>
                    </td>

                    <td style="padding-left: 20px">
                      <a href="https://x.com/MontraNige96058" target="_blank">
                        <img
                          src="https://m4cs.vercel.app/img/new-twitter.png"
                          alt="X"
                          width="18"
                          style="
                            display: block;
                            opacity: 1 !important;
                            filter: none !important;
                            -webkit-filter: none !important;
                            mix-blend-mode: normal !important;
                            
                          "
                        />
                      </a>
                    </td>

                    <td style="padding-left: 20px">
                      <a
                        href="https://www.instagram.com/accounts/login/?next=%2Fmontra.ng%2F&source=omni_redirect"
                        target="_blank"
                      >
                        <img
                          src="https://m4cs.vercel.app/img/new-insta.png"
                          alt="Instagram"
                          width="18"
                          style="
                            display: block;
                            opacity: 1 !important;
                            filter: none !important;
                            -webkit-filter: none !important;
                            mix-blend-mode: normal !important;
                            
                          "
                        />
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
